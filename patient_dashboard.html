{% extends "base.html" %}

{% block content %}

<h2>🧑‍⚕️ Patient Dashboard</h2>

<div class="dashboard-grid">

    <!-- Book Appointment -->
    <div class="dashboard-box">
        <h3>📅 Book Appointment</h3>
        <p>Schedule a new appointment with a doctor.</p>
        <a href="/book_appointment" class="btn">Book Now</a>
    </div>

    <!-- View Appointments -->
    <div class="dashboard-box">
        <h3>📋 View Appointments</h3>
        <p>Check your upcoming and past appointments.</p>
        <a href="/view_appointments" class="btn">View</a>
    </div>

    <!-- Search Appointment -->
    <div class="dashboard-box">
        <h3>🔍 Search Appointment</h3>
        <p>Search your appointments by date.</p>

        <form action="/search" method="POST">
            <input type="date" name="date" required>
            <button type="submit" class="btn">Search</button>
        </form>
    </div>

</div>

{% endblock %}
