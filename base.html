<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedTrack - Healthcare Management System</title>

    <!-- Responsive Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS Link -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- ================= Navbar ================= -->
    <div class="navbar">
        <h1>🩺 MedTrack</h1>

        <div>
            {% if session.get('user') %}
                <a href="/">Home</a>
                
                {% if session.get('role') == 'doctor' %}
                    <a href="/doctor_dashboard">Dashboard</a>
                {% else %}
                    <a href="/patient_dashboard">Dashboard</a>
                {% endif %}
                
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
                <a href="/register">Register</a>
            {% endif %}
        </div>
    </div>

    <!-- ================= Main Content ================= -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- ================= Footer ================= -->
    <div class="footer">
        <p>© 2026 MedTrack | Cloud Enabled Healthcare Management System</p>
    </div>

</body>
</html>
